<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engagement Investitori — Il Poglío · FranKi Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blu:#2B38B0;--arancio:#F0A500;--grigio-bg:#F2F1ED;--dark:#111118;
  --bordo:#D8D5CF;--verde:#22c55e;--rosso:#ef4444;--giallo:#F0A500;
  --viola:#7c3aed;
}
body{font-family:'Barlow',sans-serif;background:var(--grigio-bg);color:#222;font-size:14px;min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:var(--blu);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;gap:8px}
.fk-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;display:inline-flex;align-items:center;text-decoration:none;flex-shrink:0}
.fk-logo .fran{color:#FFF}
.fk-logo .ki{background:#F0A500;color:#FFF;border-radius:5px;padding:1px 6px;margin-left:2px;display:inline-block}
.nav-title{color:rgba(255,255,255,0.65);font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex:1;text-align:center}
.nav-btn{background:var(--arancio);color:#FFF;border:none;border-radius:4px;padding:7px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;flex-shrink:0}
.nav-btn-ghost{background:rgba(255,255,255,0.12);color:#FFF;border:none;border-radius:4px;padding:7px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1px;cursor:pointer;flex-shrink:0}

/* SYNC BANNER */
.sync-banner{background:var(--blu);color:rgba(255,255,255,0.8);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:8px 16px;text-align:center;display:none;border-bottom:1px solid rgba(255,255,255,0.1)}

/* PROGRESS */
.prog-wrap{background:#FFF;padding:10px 16px;border-bottom:1px solid var(--bordo);display:flex;align-items:center;gap:10px}
.prog-label{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;color:var(--blu);text-transform:uppercase;white-space:nowrap}
.prog-bar-bg{flex:1;height:5px;background:var(--bordo);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:5px;background:var(--verde);border-radius:3px;transition:width .4s}
.prog-pct{font-size:11px;color:#aaa;white-space:nowrap}

/* FILTRI */
.filtri{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:#FFF;border-bottom:1px solid var(--bordo)}
.f-btn{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:3px;border:1px solid var(--bordo);background:transparent;color:#888;cursor:pointer;white-space:nowrap;flex-shrink:0}
.f-btn.active{background:var(--blu);color:#FFF;border-color:var(--blu)}

/* INDICE */
.indice-wrap{max-width:680px;margin:0 auto;padding:12px 16px 0}
.indice-toggle-btn{width:100%;padding:10px 16px;background:#FFF;border:1px solid var(--bordo);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--dark);margin-bottom:8px}
.indice-toggle-btn span{font-size:12px;color:var(--arancio)}
.indice-box{background:#FFF;border-radius:6px;border:1px solid var(--bordo);overflow:hidden;display:none;margin-bottom:10px}
.indice-box.open{display:block}
.indice-head-row{display:grid;grid-template-columns:1fr 60px 70px 70px 60px;gap:0;background:var(--blu);padding:8px 14px}
.indice-head-row span{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.7)}
.indice-row{display:grid;grid-template-columns:1fr 60px 70px 70px 60px;gap:0;padding:9px 14px;border-bottom:1px solid #f5f3f0;align-items:center;cursor:pointer;transition:background .1s}
.indice-row:last-child{border-bottom:none}
.indice-row:hover{background:#fafaf8}
.ir-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ir-fase{font-size:10px;color:#888;margin-top:2px}
.ir-stelle{color:var(--arancio);font-size:12px;letter-spacing:1px}
.ir-urg-bar{height:6px;border-radius:3px;background:#eee;overflow:hidden;margin-bottom:2px}
.ir-urg-fill{height:6px;border-radius:3px}
.ir-urg-label{font-size:9px}
.ir-prossimo{font-size:10px;color:#888;text-align:right}

/* LISTA */
.lista{max-width:680px;margin:0 auto;padding:10px 16px 40px}

/* CARD */
.card{background:#FFF;border-radius:8px;margin-bottom:10px;overflow:hidden;border-left:4px solid var(--bordo)}
.card.f-0{border-left-color:#aaa}
.card.f-1{border-left-color:var(--giallo)}
.card.f-2{border-left-color:var(--blu)}
.card.f-3{border-left-color:var(--viola)}
.card.f-done{border-left-color:var(--verde)}
.card.f-no{border-left-color:var(--rosso);opacity:.5}

/* CARD HEAD */
.card-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.card-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#FFF;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-nome{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:var(--dark);text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card-badge{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.cb-0{background:#f0f0f0;color:#888}
.cb-1{background:#fff3cd;color:#856404}
.cb-2{background:#e8f0fe;color:var(--blu)}
.cb-3{background:#f3e8fd;color:var(--viola)}
.cb-done{background:#d4f0d4;color:#1a7a1a}
.cb-no{background:#fde0e0;color:#a00}
.card-arrow{font-size:16px;color:#bbb;flex-shrink:0;transition:transform .2s}
.card.expanded .card-arrow{transform:rotate(180deg)}

/* CARD BODY */
.card-body{display:none;border-top:1px solid var(--bordo);padding:14px}
.card.expanded .card-body{display:block}

/* FUNNEL */
.funnel{display:flex;border-radius:4px;overflow:hidden;border:1px solid var(--bordo);margin-bottom:12px}
.fn-step{flex:1;padding:7px 4px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#bbb;background:#fafaf8;border-right:1px solid var(--bordo);cursor:pointer;transition:all .1s}
.fn-step:last-child{border-right:none}
.fn-step span{display:block;font-size:7px;margin-top:2px;opacity:.7}
.fn-step.active{background:var(--blu);color:#FFF}
.fn-step.done{background:#d4f0d4;color:#1a7a1a}
.fn-step.no{background:#fde0e0;color:#a00}

/* DETTAGLI */
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.det-cell{background:var(--grigio-bg);border-radius:4px;padding:8px 10px}
.det-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.det-val{font-size:13px;color:var(--dark);font-weight:600}
.det-val a{color:var(--blu);font-size:12px;text-decoration:none}

/* NOTE */
.note-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.note-ta{width:100%;border:1px solid var(--bordo);border-radius:4px;padding:8px 10px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--dark);background:#fff;resize:vertical;min-height:56px;outline:none}
.note-ta:focus{border-color:var(--blu)}

/* STELLE */
.stelle-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:12px}
.stelle-row{display:flex;gap:6px;margin-bottom:10px}
.stella{font-size:24px;cursor:pointer;color:#ddd;user-select:none;transition:transform .1s}
.stella.on{color:var(--arancio)}
.stella:hover{transform:scale(1.15)}

/* DATE */
.date-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.date-cell label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:4px}
.date-cell input[type=date]{width:100%;border:1px solid var(--bordo);border-radius:4px;padding:7px 10px;font-family:'Barlow',sans-serif;font-size:13px;color:var(--dark);background:#fff;outline:none}
.date-cell input[type=date]:focus{border-color:var(--blu)}

/* URGENZA */
.urg-wrap{margin-bottom:12px}
.urg-bar-bg{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin:4px 0}
.urg-bar-fill{height:8px;border-radius:4px;transition:width .3s}
.urg-text{font-size:11px;font-weight:700}

/* AZIONI */
.azioni{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid #f0ede8}
.btn-avanza{background:var(--blu);color:#FFF;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:7px 14px;border-radius:3px;border:none;cursor:pointer}
.btn-edit{background:var(--grigio-bg);color:#555;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:7px 12px;border-radius:3px;border:1px solid var(--bordo);cursor:pointer}
.btn-no{background:#fde0e0;color:#a00;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:7px 12px;border-radius:3px;border:none;cursor:pointer}
.btn-del{background:transparent;color:#ccc;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:7px 10px;border-radius:3px;border:1px solid #eee;cursor:pointer}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;text-transform:uppercase;color:#ccc}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal{background:#FFF;border-radius:8px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-head{background:var(--blu);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:2}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;color:#FFF;text-transform:uppercase}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.6);font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.modal-body{padding:18px}
.fg{margin-bottom:14px}
.fg label{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888;display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid var(--bordo);border-radius:4px;padding:9px 12px;font-family:'Barlow',sans-serif;font-size:14px;color:var(--dark);background:#fff;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blu)}
.fg textarea{resize:vertical;min-height:56px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg-stelle{display:flex;gap:6px;margin-top:4px}
.fg-stella{font-size:28px;cursor:pointer;color:#ddd;user-select:none;transition:transform .1s}
.fg-stella.on{color:var(--arancio)}
.fg-stella:hover{transform:scale(1.1)}
.modal-foot{padding:0 18px 18px;display:flex;gap:8px;justify-content:flex-end}
.btn-save{background:var(--arancio);color:#FFF;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:1px;padding:10px 22px;border-radius:4px;border:none;cursor:pointer}
.btn-cancel{background:var(--grigio-bg);color:#666;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:1px;padding:10px 18px;border-radius:4px;border:1px solid var(--bordo);cursor:pointer}

.hub-btn{position:fixed;bottom:20px;right:20px;z-index:9999;width:44px;height:44px;background:var(--blu);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 2px 12px rgba(0,0,0,.25);font-size:20px}

footer{background:var(--dark);padding:20px 16px;text-align:center;margin-top:8px}
footer p{color:rgba(255,255,255,.3);font-size:10px;line-height:1.8}
</style>
</head>
<body>

<nav>
  <a class="fk-logo" href="#"><span class="fran">Fran</span><span class="ki">Ki</span></a>
  <span class="nav-title">Engagement · Il Poglío</span>
  <button class="nav-btn-ghost" id="btn-script" onclick="toggleScript()">📋 Script</button>
  <button class="nav-btn" id="btn-aggiungi" onclick="openModal()">+ Aggiungi</button>
</nav>

<div class="sync-banner" id="sync-banner">Sincronizzazione Google Sheet...</div>

<div class="prog-wrap">
  <div class="prog-label" id="prog-label">0 / 6 posti</div>
  <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-pct" id="prog-pct">0%</div>
</div>

<div class="filtri">
  <button class="f-btn active" onclick="setFiltro('tutti',this)">Tutti</button>
  <button class="f-btn" onclick="setFiltro('0',this)">🔘 Da contattare</button>
  <button class="f-btn" onclick="setFiltro('1',this)">🟡 Call fatta</button>
  <button class="f-btn" onclick="setFiltro('2',this)">🔵 Doc inviato</button>
  <button class="f-btn" onclick="setFiltro('3',this)">🟣 In chiusura</button>
  <button class="f-btn" onclick="setFiltro('done',this)">✅ Firmato</button>

</div>

<!-- INDICE -->
<div class="indice-wrap">
  <button class="indice-toggle-btn" onclick="toggleIndice()">
    <span>📋 Indice contatti</span>
    <span id="indice-toggle-label">▾ Mostra</span>
  </button>
  <div class="indice-box" id="indice-box">
    <div class="indice-head-row" style="grid-template-columns:1fr 60px 70px 70px 60px">
      <span>Nome · Fase</span>
      <span>Chi</span>
      <span>Stelle</span>
      <span>Urgenza</span>
      <span>Check</span>

    <div id="indice-rows"></div>
  </div>
</div>

<!-- LISTA -->
<div class="lista" id="lista"></div>

<!-- MODAL -->
<div class="modal-ov" id="modal-ov">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">Nuovo contatto</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <div class="fg">
        <label>Nome e cognome *</label>
        <input type="text" id="f-nome" placeholder="Es. Mario Rossi">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Ruolo / Professione</label>
          <input type="text" id="f-ruolo" placeholder="Es. Imprenditore">
        </div>
        <div class="fg">
          <label>Tipo profilo</label>
          <select id="f-tipo">
            <option value="fin">Investitore puro</option>
            <option value="op">Socio operativo</option>
          </select>
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Canale</label>
          <select id="f-canale">
            <option value="FranKi">FranKi</option>
            <option value="Affio">Affio</option>
            <option value="Altro">Altro</option>
          </select>
        </div>
        <div class="fg">
          <label>Fase attuale</label>
          <select id="f-fase">
            <option value="0">🔘 Da contattare</option>
            <option value="1">🟡 Call fatta</option>
            <option value="2">🔵 Doc inviato</option>
            <option value="3">🟣 In chiusura</option>
            <option value="done">✅ Firmato</option>
            <option value="no">❌ No</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Note</label>
        <textarea id="f-note" placeholder="Note libere..."></textarea>
      </div>
      <div class="fg">
        <label>Probabilità partecipazione</label>
        <div class="fg-stelle" id="fg-stelle">
          <span class="fg-stella" data-v="1" onclick="setModalStelle(1)">★</span>
          <span class="fg-stella" data-v="2" onclick="setModalStelle(2)">★</span>
          <span class="fg-stella" data-v="3" onclick="setModalStelle(3)">★</span>
          <span class="fg-stella" data-v="4" onclick="setModalStelle(4)">★</span>
          <span class="fg-stella" data-v="5" onclick="setModalStelle(5)">★</span>
        </div>
        <input type="hidden" id="f-stelle" value="0">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Ultimo contatto</label>
          <input type="date" id="f-data-u">
        </div>
        <div class="fg">
          <label>Prossimo contatto</label>
          <input type="date" id="f-data-p">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-save" onclick="salva()">Salva</button>
    </div>
  </div>
</div>

<footer>
  <p>Engagement Investitori · RCV Il Poglío · FranKi Studio (Avre Srl) · Napoli</p>
</footer>

<a href="https://valzinga.github.io/frankistudio/affio/rcv/" class="hub-btn" title="Hub">🏠</a>

<script>
// ============================================================
// CONFIGURAZIONE
// ============================================================
var SHEET_URL = 'https://script.google.com/macros/s/AKfycbw11lIO4uJHCVAr6yh99kKgUym1i1gpbQAcrkiM6FkE5OuwrNSSC4eXJXuW0zOal2lrVg/exec';
var LS_KEY = 'rcv-eng-v2';
var filtroAttivo = 'tutti';
var indiceAperto = false;
var scriptAperto = false;

// ============================================================
// DATI
// ============================================================
var FASI = {
  '0':    {label:'Da contattare', badge:'cb-0', color:'#aaa'},
  '1':    {label:'Call fatta',    badge:'cb-1', color:'#F0A500'},
  '2':    {label:'Doc inviato',   badge:'cb-2', color:'#2B38B0'},
  '3':    {label:'In chiusura',   badge:'cb-3', color:'#7c3aed'},
  'done': {label:'Firmato',       badge:'cb-done', color:'#22c55e'},
  'no':   {label:'No',           badge:'cb-no', color:'#ef4444'},
};

var COLORI = ['#2B38B0','#F0A500','#1a7a1a','#7c3aed','#c5221f','#0891b2','#be185d','#b45309'];

function getData() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch(e) { return []; }
}

function setData(d) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e) {}
  syncSheet(d);
}

function iniziali(nome) {
  var p = nome.trim().split(' ');
  return p.length >= 2 ? (p[0][0]+p[1][0]).toUpperCase() : nome.substring(0,2).toUpperCase();
}

function colore(nome) {
  var h = 0;
  for (var i=0;i<nome.length;i++) h = (h*31+nome.charCodeAt(i)) & 0xFFFFFF;
  return COLORI[Math.abs(h) % COLORI.length];
}

function nextFase(f) {
  var ord = ['0','1','2','3','done'];
  var i = ord.indexOf(f);
  return i >= 0 && i < ord.length-1 ? ord[i+1] : f;
}

// ============================================================
// URGENZA
// ============================================================
function urgenza(c) {
  var oggi = new Date(); oggi.setHours(0,0,0,0);
  if (c.fase === 'done' || c.fase === 'no') return {color:'#ccc', pct:0, label:'—'};
  if (c.dataProssimo) {
    var p = new Date(c.dataProssimo);
    var diff = Math.round((p-oggi)/(86400000));
    if (diff < 0)  return {color:'#ef4444', pct:100, label:'Scaduto '+Math.abs(diff)+'gg fa'};
    if (diff === 0) return {color:'#ef4444', pct:100, label:'Oggi!'};
    if (diff <= 2)  return {color:'#ef4444', pct:85,  label:'Fra '+diff+' gg'};
    if (diff <= 5)  return {color:'#F0A500', pct:60,  label:'Fra '+diff+' gg'};
    if (diff <= 10) return {color:'#F0A500', pct:35,  label:'Fra '+diff+' gg'};
    return {color:'#22c55e', pct:15, label:'Fra '+diff+' gg'};
  }
  if (c.dataUltimo) {
    var u = new Date(c.dataUltimo);
    var diff2 = Math.round((oggi-u)/(86400000));
    if (diff2 > 14) return {color:'#ef4444', pct:90, label:'Fermo da '+diff2+'gg'};
    if (diff2 > 7)  return {color:'#F0A500', pct:55, label:'Fermo da '+diff2+'gg'};
    return {color:'#22c55e', pct:20, label:'Contattato '+diff2+'gg fa'};
  }
  return {color:'#F0A500', pct:50, label:'Nessuna data'};
}

// ============================================================
// SYNC GOOGLE SHEET
// ============================================================
function syncSheet(d) {
  fetch(SHEET_URL, {
    method:'POST',
    body:JSON.stringify({action:'save_all', rows:d}),
  }).catch(function(){});
}

function loadSheet() {
  document.getElementById('sync-banner').style.display = 'block';
  fetch(SHEET_URL)
    .then(function(r){ return r.json(); })
    .then(function(rows) {
      document.getElementById('sync-banner').style.display = 'none';
      if (rows && Array.isArray(rows) && rows.length > 0 && rows[0].id) {
        localStorage.setItem(LS_KEY, JSON.stringify(rows));
        render();
      }
    })
    .catch(function(){
      document.getElementById('sync-banner').style.display = 'none';
    });
}

// ============================================================
// RENDER LISTA
// ============================================================
function render() {
  var d = getData();
  var lista = document.getElementById('lista');
  lista.innerHTML = '';

  // Progresso
  var firmati = d.filter(function(c){ return c.fase==='done'; }).length;
  var pct = Math.round(firmati/6*100);
  document.getElementById('prog-label').textContent = firmati+' / 6 posti';
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';

  var filtrati = filtroAttivo==='tutti' ? d : d.filter(function(c){ return c.fase===filtroAttivo; });

  if (filtrati.length === 0) {
    lista.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div class="empty-text">Nessun contatto ancora<br>Premi + Aggiungi</div></div>';
    renderIndice(d);
    return;
  }

  filtrati.forEach(function(c) {
    var f = FASI[c.fase] || FASI['0'];
    var u = urgenza(c);
    var stelle = '';
    for (var i=1;i<=5;i++) {
      stelle += '<span class="stella'+(i<=(c.stelle||0)?' on':'')+'" onclick="setStelle(\''+c.id+'\','+i+')">★</span>';
    }
    var docLink = 'https://valzinga.github.io/frankistudio/affio/rcv/POGLIO_Presentazione_Esterna.html'+(c.tipo==='op'?'?v=op':'');
    var prossima = nextFase(c.fase);
    var puoAvanzare = c.fase!=='done' && c.fase!=='no';

    var div = document.createElement('div');
    div.className = 'card f-'+c.fase+(c.expanded?' expanded':'');
    div.dataset.id = c.id;

    div.innerHTML =
      '<div class="card-head" onclick="toggleCard(\''+c.id+'\')">' +
        '<div class="card-avatar" style="background:'+colore(c.nome)+'">'+iniziali(c.nome)+'</div>' +
        '<div class="card-info">' +
          '<div class="card-nome">'+c.nome+'</div>' +
          '<div class="card-sub">'+(c.ruolo||'—')+' · '+c.canale+'</div>' +
        '</div>' +
        '<span class="card-badge '+f.badge+'">'+f.label+'</span>' +
        '<span class="card-arrow">▾</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="funnel">' +
          '<div class="fn-step '+(c.fase==='0'?'active':['1','2','3','done'].includes(c.fase)?'done':'')+'" onclick="setFase(\''+c.id+'\',\'0\')">M0<span>Semina</span></div>' +
          '<div class="fn-step '+(c.fase==='1'?'active':['2','3','done'].includes(c.fase)?'done':'')+'" onclick="setFase(\''+c.id+'\',\'1\')">M1<span>Call</span></div>' +
          '<div class="fn-step '+(c.fase==='2'?'active':['3','done'].includes(c.fase)?'done':'')+'" onclick="setFase(\''+c.id+'\',\'2\')">M2<span>Doc</span></div>' +
          '<div class="fn-step '+(c.fase==='3'?'active':c.fase==='done'?'done':'')+'" onclick="setFase(\''+c.id+'\',\'3\')">M3<span>Chiusura</span></div>' +
          '<div class="fn-step '+(c.fase==='done'?'done':'')+'" onclick="setFase(\''+c.id+'\',\'done\')">✓<span>Firmato</span></div>' +
          '<div class="fn-step '+(c.fase==='no'?'no':'')+'" onclick="setFase(\''+c.id+'\',\'no\')">✗<span>No</span></div>' +
        '</div>' +
        '<div class="det-grid">' +
          '<div class="det-cell"><div class="det-label">Profilo</div><div class="det-val">'+(c.tipo==='op'?'⭐ Operativo':'💰 Investitore')+'</div></div>' +
          '<div class="det-cell"><div class="det-label">Canale</div><div class="det-val">'+c.canale+'</div></div>' +
          '<div class="det-cell"><div class="det-label">Documento</div><div class="det-val"><a href="'+docLink+'" target="_blank">Apri →</a></div></div>' +
          '<div class="det-cell"><div class="det-label">Aggiunto</div><div class="det-val">'+(c.dataAgg||'—')+'</div></div>' +
        '</div>' +
        '<div class="note-label">Note</div>' +
        '<textarea class="note-ta" placeholder="Note libere..." onchange="salvaNota(\''+c.id+'\',this.value)">'+escapeHtml(c.note||'')+'</textarea>' +
        '<div class="stelle-label">Probabilità partecipazione</div>' +
        '<div class="stelle-row">'+stelle+'</div>' +
        '<div class="date-grid">' +
          '<div class="date-cell"><label>Ultimo contatto</label><input type="date" value="'+(c.dataUltimo||'')+'" onchange="salvaData(\''+c.id+'\',\'dataUltimo\',this.value)"></div>' +
          '<div class="date-cell"><label>Prossimo contatto</label><input type="date" value="'+(c.dataProssimo||'')+'" onchange="salvaData(\''+c.id+'\',\'dataProssimo\',this.value)"></div>' +
        '</div>' +
        '<div class="urg-wrap">' +
          '<div class="note-label">Urgenza contatto</div>' +
          '<div class="urg-bar-bg"><div class="urg-bar-fill" style="width:'+u.pct+'%;background:'+u.color+'"></div></div>' +
          '<div class="urg-text" style="color:'+u.color+'">'+u.label+'</div>' +
        '</div>' +
        '<div class="azioni">' +
          (puoAvanzare?'<button class="btn-avanza" onclick="avanza(\''+c.id+'\')">→ '+FASI[prossima].label+'</button>':'')+
          '<button class="btn-edit" onclick="openEdit(\''+c.id+'\')">✏ Modifica</button>' +
          '<button class="btn-no" onclick="setFase(\''+c.id+'\',\'no\')">❌ No</button>' +
          '<button class="btn-del" onclick="elimina(\''+c.id+'\')">🗑</button>' +
        '</div>' +
      '</div>';

    lista.appendChild(div);
  });

  renderIndice(d);
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// INDICE
// ============================================================
function renderIndice(d) {
  var rows = document.getElementById('indice-rows');
  if (!rows) return;
  var ordFase = {'done':0,'3':1,'2':2,'1':3,'0':4,'no':5};
  var sorted = d.slice().sort(function(a,b){
    var fa = ordFase[a.fase]!==undefined?ordFase[a.fase]:6;
    var fb = ordFase[b.fase]!==undefined?ordFase[b.fase]:6;
    if (fa!==fb) return fa-fb;
    return (b.stelle||0)-(a.stelle||0);
  });
  rows.innerHTML = sorted.map(function(c){
    var u = urgenza(c);
    var stelle = '';
    for(var i=1;i<=5;i++) stelle+='<span style="color:'+(i<=(c.stelle||0)?'#F0A500':'#ddd')+';font-size:11px">★</span>';
    var prossimo = c.dataProssimo?c.dataProssimo.split('-').reverse().join('/'):'—';
    var chkColor = c.fase==='done'?'#22c55e':c.fase==='no'?'#ef4444':'#ddd';
    var chkIcon = c.fase==='done'?'<b style="color:#22c55e">✓</b>':c.fase==='no'?'<b style="color:#ef4444">✗</b>':'<span style="color:#ddd">○</span>';
    var chiColor = c.canale==='FranKi'?'#2B38B0':c.canale==='Affio'?'#F0A500':'#888';
    return '<div class="indice-row" onclick="jumpToCard(\'' + c.id + '\'">' +
      '<div><div class="ir-nome">' + c.nome + '</div><div class="ir-fase">' + ((FASI[c.fase]||{}).label||'') + '</div></div>' +
      '<div style="font-family:Barlow Condensed,sans-serif;font-weight:900;font-size:11px;color:' + chiColor + '">' + (c.canale||'—') + '</div>' +
      '<div class="ir-stelle">' + stelle + '</div>' +
      '<div><div class="ir-urg-bar"><div class="ir-urg-fill" style="width:' + u.pct + '%;background:' + u.color + '"></div></div><div class="ir-urg-label" style="color:' + u.color + '">' + u.label + '</div></div>' +
      '<div style="text-align:center">' + chkIcon + '</div>' +
    '</div>';
  }).join('');
}

function toggleIndice() {
  indiceAperto = !indiceAperto;
  document.getElementById('indice-box').classList.toggle('open', indiceAperto);
  document.getElementById('indice-toggle-label').textContent = indiceAperto ? '▴ Nascondi' : '▾ Mostra';
  if (indiceAperto) renderIndice(getData());
}

function jumpToCard(id) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c.expanded = true; setData(d); render(); }
  setTimeout(function(){
    var el = document.querySelector('[data-id="'+id+'"]');
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 150);
}

// ============================================================
// AZIONI
// ============================================================
function toggleCard(id) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c.expanded = !c.expanded; setData(d); render(); }
}

function avanza(id) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c.fase = nextFase(c.fase); setData(d); render(); }
}

function setFase(id, fase) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c.fase = fase; setData(d); render(); }
}

function salvaNota(id, val) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c.note = val; setData(d); }
}

function salvaData(id, campo, val) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c[campo] = val; setData(d); renderIndice(d); render(); }
}

function setStelle(id, val) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (c) { c.stelle = val; setData(d); render(); }
}

function elimina(id) {
  if (!confirm('Eliminare questo contatto?')) return;
  var d = getData().filter(function(x){ return x.id!==id; });
  setData(d); render();
}

function setFiltro(f, btn) {
  filtroAttivo = f;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

// ============================================================
// MODAL STELLE
// ============================================================
function setModalStelle(val) {
  document.getElementById('f-stelle').value = val;
  document.querySelectorAll('.fg-stella').forEach(function(s){
    s.classList.toggle('on', parseInt(s.dataset.v) <= val);
  });
}

function resetModalStelle() {
  document.getElementById('f-stelle').value = '0';
  document.querySelectorAll('.fg-stella').forEach(function(s){ s.classList.remove('on'); });
}

// ============================================================
// MODAL APRI / CHIUDI
// ============================================================
function openModal() {
  document.getElementById('modal-title').textContent = 'Nuovo contatto';
  document.getElementById('f-id').value = '';
  document.getElementById('f-nome').value = '';
  document.getElementById('f-ruolo').value = '';
  document.getElementById('f-tipo').value = 'fin';
  document.getElementById('f-canale').value = 'FranKi';
  document.getElementById('f-fase').value = '0';
  document.getElementById('f-note').value = '';
  document.getElementById('f-data-u').value = '';
  document.getElementById('f-data-p').value = '';
  resetModalStelle();
  document.getElementById('modal-ov').classList.add('open');
  setTimeout(function(){ document.getElementById('f-nome').focus(); }, 50);
}

function openEdit(id) {
  var d = getData();
  var c = d.find(function(x){ return x.id===id; });
  if (!c) return;
  document.getElementById('modal-title').textContent = 'Modifica contatto';
  document.getElementById('f-id').value = c.id;
  document.getElementById('f-nome').value = c.nome;
  document.getElementById('f-ruolo').value = c.ruolo||'';
  document.getElementById('f-tipo').value = c.tipo||'fin';
  document.getElementById('f-canale').value = c.canale||'FranKi';
  document.getElementById('f-fase').value = c.fase||'0';
  document.getElementById('f-note').value = c.note||'';
  document.getElementById('f-data-u').value = c.dataUltimo||'';
  document.getElementById('f-data-p').value = c.dataProssimo||'';
  setModalStelle(c.stelle||0);
  document.getElementById('modal-ov').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-ov').classList.remove('open');
}

// ============================================================
// SALVA CONTATTO
// ============================================================
function salva() {
  var nome = document.getElementById('f-nome').value.trim();
  if (!nome) { alert('Inserisci il nome del contatto'); return; }

  var d = getData();
  var editId = document.getElementById('f-id').value;

  if (editId) {
    var c = d.find(function(x){ return x.id===editId; });
    if (c) {
      c.nome = nome;
      c.ruolo = document.getElementById('f-ruolo').value.trim();
      c.tipo = document.getElementById('f-tipo').value;
      c.canale = document.getElementById('f-canale').value;
      c.fase = document.getElementById('f-fase').value;
      c.note = document.getElementById('f-note').value.trim();
      c.stelle = parseInt(document.getElementById('f-stelle').value)||0;
      c.dataUltimo = document.getElementById('f-data-u').value;
      c.dataProssimo = document.getElementById('f-data-p').value;
    }
  } else {
    d.push({
      id: Date.now().toString(),
      nome: nome,
      ruolo: document.getElementById('f-ruolo').value.trim(),
      tipo: document.getElementById('f-tipo').value,
      canale: document.getElementById('f-canale').value,
      fase: document.getElementById('f-fase').value,
      note: document.getElementById('f-note').value.trim(),
      stelle: parseInt(document.getElementById('f-stelle').value)||0,
      dataUltimo: document.getElementById('f-data-u').value,
      dataProssimo: document.getElementById('f-data-p').value,
      dataAgg: new Date().toLocaleDateString('it-IT'),
      expanded: true,
    });
  }

  setData(d);
  closeModal();
  render();
}

// ============================================================
// SCRIPT PANEL (placeholder)
// ============================================================
function toggleScript() {
  scriptAperto = !scriptAperto;
  document.getElementById('btn-script').textContent = scriptAperto ? '✕ Script' : '📋 Script';
}

// ============================================================
// OVERLAY CLICK
// ============================================================
document.getElementById('modal-ov').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

// ============================================================
// BOOT
// ============================================================
render();
loadSheet();
</script>
</body>
</html>
